version: '3.8'

services:
  # Main Hydrology Application
  hydrology-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: hydrology-app
    ports:
      - "8080:8080"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://hydrology:hydrology123@postgres:5432/hydrology_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
    networks:
      - hydrology-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  postgres:
    image: postgres:13-alpine
    container_name: hydrology-postgres
    environment:
      - POSTGRES_DB=hydrology_db
      - POSTGRES_USER=hydrology
      - POSTGRES_PASSWORD=hydrology123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - hydrology-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydrology -d hydrology_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: hydrology-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hydrology-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: hydrology-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./gui/web:/usr/share/nginx/html/gui
    depends_on:
      - hydrology-app
    networks:
      - hydrology-network
    restart: unless-stopped

  # Development Environment
  hydrology-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: hydrology-dev
    ports:
      - "5000:5000"
      - "8081:8081"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - DATABASE_URL=postgresql://hydrology:hydrology123@postgres:5432/hydrology_db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
      - /app/__pycache__
      - /app/.pytest_cache
    depends_on:
      - postgres
      - redis
    networks:
      - hydrology-network
    profiles:
      - dev
    command: >
      sh -c "python -m flask run --host=0.0.0.0 --port=5000 --debug &
             cd gui/web && python -m http.server 8081 &
             wait"

  # Testing Environment
  hydrology-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: testing
    container_name: hydrology-test
    environment:
      - FLASK_ENV=testing
      - DATABASE_URL=postgresql://hydrology:hydrology123@postgres-test:5432/hydrology_test_db
    volumes:
      - .:/app
      - test_coverage:/app/htmlcov
    depends_on:
      - postgres-test
    networks:
      - hydrology-network
    profiles:
      - test

  # Test Database
  postgres-test:
    image: postgres:13-alpine
    container_name: hydrology-postgres-test
    environment:
      - POSTGRES_DB=hydrology_test_db
      - POSTGRES_USER=hydrology
      - POSTGRES_PASSWORD=hydrology123
    tmpfs:
      - /var/lib/postgresql/data
    networks:
      - hydrology-network
    profiles:
      - test

  # Documentation Server
  hydrology-docs:
    build:
      context: .
      dockerfile: Dockerfile
      target: docs
    container_name: hydrology-docs
    ports:
      - "8000:8000"
    networks:
      - hydrology-network
    profiles:
      - docs

  # Monitoring with Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: hydrology-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - hydrology-network
    profiles:
      - monitoring
    restart: unless-stopped

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: hydrology-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - hydrology-network
    profiles:
      - monitoring
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  test_coverage:

networks:
  hydrology-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Environment-specific overrides
# Use: docker-compose -f docker-compose.yml -f docker-compose.override.yml up
# Or: docker-compose --profile dev up (for development)
# Or: docker-compose --profile test up (for testing)
# Or: docker-compose --profile monitoring up (for monitoring)