apiVersion: v1
kind: Service
metadata:
  name: hydrology-app-service
  namespace: hydrology
  labels:
    app: hydrology-app
    component: backend
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: hydrology-app
  sessionAffinity: None

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: hydrology
  labels:
    app: postgres
    component: database
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres
  selector:
    app: postgres
  sessionAffinity: None

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: hydrology
  labels:
    app: redis
    component: cache
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
    name: redis
  selector:
    app: redis
  sessionAffinity: None

---
# LoadBalancer service for external access
apiVersion: v1
kind: Service
metadata:
  name: hydrology-loadbalancer
  namespace: hydrology
  labels:
    app: hydrology-app
    component: loadbalancer
  annotations:
    # AWS Load Balancer annotations
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:region:account:certificate/cert-id"
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "https"
    
    # Azure Load Balancer annotations
    service.beta.kubernetes.io/azure-load-balancer-internal: "false"
    service.beta.kubernetes.io/azure-pip-name: "hydrology-public-ip"
    
    # GCP Load Balancer annotations
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"default": "hydrology-backend-config"}'
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  - port: 443
    targetPort: 8080
    protocol: TCP
    name: https
  selector:
    app: hydrology-app
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

---
# NodePort service for development/testing
apiVersion: v1
kind: Service
metadata:
  name: hydrology-nodeport
  namespace: hydrology
  labels:
    app: hydrology-app
    component: nodeport
spec:
  type: NodePort
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
    protocol: TCP
    name: http
  selector:
    app: hydrology-app

---
# Headless service for StatefulSet (if needed)
apiVersion: v1
kind: Service
metadata:
  name: hydrology-headless
  namespace: hydrology
  labels:
    app: hydrology-app
    component: headless
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: hydrology-app

---
# External service for external database (if using managed database)
apiVersion: v1
kind: Service
metadata:
  name: external-postgres
  namespace: hydrology
  labels:
    app: external-postgres
spec:
  type: ExternalName
  externalName: postgres.example.com
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres

---
# Service monitor for Prometheus
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: hydrology-app-monitor
  namespace: hydrology
  labels:
    app: hydrology-app
    component: monitoring
spec:
  selector:
    matchLabels:
      app: hydrology-app
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
    scheme: http
    scrapeTimeout: 10s
    honorLabels: true
    metricRelabelings:
    - sourceLabels: [__name__]
      regex: 'go_.*'
      action: drop
    - sourceLabels: [__name__]
      regex: 'promhttp_.*'
      action: drop
  namespaceSelector:
    matchNames:
    - hydrology

---
# Pod monitor for additional metrics
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: hydrology-pod-monitor
  namespace: hydrology
  labels:
    app: hydrology-app
    component: monitoring
spec:
  selector:
    matchLabels:
      app: hydrology-app
  podMetricsEndpoints:
  - port: metrics
    interval: 30s
    path: /metrics
    scheme: http
  namespaceSelector:
    matchNames:
    - hydrology