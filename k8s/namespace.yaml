apiVersion: v1
kind: Namespace
metadata:
  name: hydrology
  labels:
    name: hydrology
    environment: production
    app: hydrology-framework
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: hydrology-quota
  namespace: hydrology
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "10"
    services: "10"
    secrets: "10"
    configmaps: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: hydrology-limits
  namespace: hydrology
spec:
  limits:
  - default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    type: Container
  - default:
      storage: "10Gi"
    type: PersistentVolumeClaim