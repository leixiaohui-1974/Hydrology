# Kubernetes Secrets for Hydrology Framework
# Note: In production, use external secret management systems like:
# - HashiCorp Vault
# - AWS Secrets Manager
# - Azure Key Vault
# - Google Secret Manager

apiVersion: v1
kind: Secret
metadata:
  name: hydrology-secrets
  namespace: hydrology
  labels:
    app: hydrology-framework
type: Opaque
data:
  # Base64 encoded secrets
  # To encode: echo -n 'your-secret' | base64
  # To decode: echo 'encoded-secret' | base64 -d
  
  # Application secrets
  SECRET_KEY: eW91ci1zZWNyZXQta2V5LWhlcmU=  # your-secret-key-here
  JWT_SECRET_KEY: and0LXNlY3JldC1rZXktaGVyZQ==  # jwt-secret-key-here
  
  # Database credentials
  POSTGRES_PASSWORD: aHlkcm9sb2d5MTIz  # hydrology123
  DATABASE_URL: cG9zdGdyZXNxbDovL2h5ZHJvbG9neTpoeWRyb2xvZ3kxMjNAcG9zdGdyZXMtc2VydmljZTo1NDMyL2h5ZHJvbG9neV9kYg==
  
  # Redis credentials (if authentication is enabled)
  REDIS_PASSWORD: cmVkaXMtcGFzc3dvcmQ=  # redis-password
  REDIS_URL: cmVkaXM6Ly86cmVkaXMtcGFzc3dvcmRAcmVkaXMtc2VydmljZTo2Mzc5LzA=
  
  # Email configuration
  MAIL_SERVER: c210cC5nbWFpbC5jb20=  # smtp.gmail.com
  MAIL_USERNAME: eW91ci1lbWFpbEBnbWFpbC5jb20=  # your-email@gmail.com
  MAIL_PASSWORD: eW91ci1hcHAtcGFzc3dvcmQ=  # your-app-password
  
  # API keys for external services
  WEATHER_API_KEY: d2VhdGhlci1hcGkta2V5LWhlcmU=  # weather-api-key-here
  MAPS_API_KEY: bWFwcy1hcGkta2V5LWhlcmU=  # maps-api-key-here
  
  # SSL/TLS certificates (if using custom certs)
  TLS_CERT: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t  # -----BEGIN CERTIFICATE-----
  TLS_KEY: LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0t  # -----BEGIN PRIVATE KEY-----

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: hydrology
  labels:
    app: postgres
type: Opaque
data:
  POSTGRES_PASSWORD: aHlkcm9sb2d5MTIz  # hydrology123
  POSTGRES_REPLICATION_PASSWORD: cmVwbGljYXRpb24xMjM=  # replication123

---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secrets
  namespace: hydrology
  labels:
    app: redis
type: Opaque
data:
  REDIS_PASSWORD: cmVkaXMtcGFzc3dvcmQ=  # redis-password

---
# Docker registry credentials (if using private registry)
apiVersion: v1
kind: Secret
metadata:
  name: docker-registry-secret
  namespace: hydrology
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: eyJhdXRocyI6eyJyZWdpc3RyeS5leGFtcGxlLmNvbSI6eyJ1c2VybmFtZSI6InVzZXIiLCJwYXNzd29yZCI6InBhc3MiLCJhdXRoIjoiZFhObGNqcHdZWE56In19fQ==

---
# TLS secret for HTTPS
apiVersion: v1
kind: Secret
metadata:
  name: hydrology-tls
  namespace: hydrology
type: kubernetes.io/tls
data:
  tls.crt: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t  # Base64 encoded certificate
  tls.key: LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0t  # Base64 encoded private key

---
# Service account token secret
apiVersion: v1
kind: Secret
metadata:
  name: hydrology-sa-token
  namespace: hydrology
  annotations:
    kubernetes.io/service-account.name: hydrology-service-account
type: kubernetes.io/service-account-token

---
# External secrets operator configuration (if using)
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: hydrology
spec:
  provider:
    vault:
      server: "https://vault.example.com"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "hydrology-role"
          serviceAccountRef:
            name: "hydrology-service-account"

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: hydrology-external-secrets
  namespace: hydrology
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: hydrology-vault-secrets
    creationPolicy: Owner
  data:
  - secretKey: database-password
    remoteRef:
      key: hydrology/database
      property: password
  - secretKey: jwt-secret
    remoteRef:
      key: hydrology/auth
      property: jwt-secret
  - secretKey: api-key
    remoteRef:
      key: hydrology/external
      property: weather-api-key