[tool:pytest]
# Pytest configuration file

# Test discovery
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test directories
testpaths = tests

# Minimum version
minversion = 6.0

# Add current directory to Python path
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --cov=hydro_model
    --cov=model_2d
    --cov=common
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=80
    --durations=10
    --maxfail=5
    -ra

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interaction
    performance: Performance and benchmark tests
    slow: Tests that take a long time to run
    network: Tests that require network access
    gpu: Tests that require GPU acceleration
    memory: Tests that use significant memory
    regression: Regression tests for bug fixes
    smoke: Quick smoke tests for basic functionality
    parametrized: Parametrized tests with multiple inputs
    mock: Tests that use mocking extensively
    io: Tests that involve file I/O operations
    numerical: Tests for numerical accuracy and stability
    visualization: Tests for plotting and visualization
    cli: Tests for command-line interface

# Test output
console_output_style = progress
junit_family = xunit2

# Warnings
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::ImportWarning
    ignore:.*GDAL.*:RuntimeWarning
    ignore:.*numpy.*:RuntimeWarning
    ignore:.*matplotlib.*:UserWarning

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Temporary directory
tmp_path_retention_count = 3
tmp_path_retention_policy = failed

# Parallel execution (if pytest-xdist is installed)
# addopts = ... -n auto

# Cache
cache_dir = .pytest_cache

# Collection
collect_ignore = [
    "setup.py",
    "build",
    "dist",
    ".git",
    ".tox",
    "venv",
    "env",
    "__pycache__"
]

# Doctest
doctest_optionflags = NORMALIZE_WHITESPACE IGNORE_EXCEPTION_DETAIL

# Timeout (if pytest-timeout is installed)
# timeout = 300
# timeout_method = thread