    category_zh: "数据与知识"
    scopes: [data]
    priority: 18
    auto_select: true
    external: false
  knowledge_mine:
    display_zh: "模型知识挖掘"
    category_zh: "数据与知识"
    scopes: [data, modeling]
    priority: 20
    auto_select: true
    external: false
  source_sync:
    display_zh: "源同步与 Wiki 投影"
    category_zh: "数据与知识"
    scopes: [data]
    priority: 22
    auto_select: false
    external: false
  source_to_delineation:
    display_zh: "地形端到端（源发现→数据包→划分）"
