# 中文工作流目录 + 端到端范围标签 + 自动选流策略（产品化配置，零案例硬编码）
# scopes 用于 --profile 过滤；priority 越小越靠前（同批按此排序）
# auto_select: 是否进入「智能选流」默认队列（排除长任务/高风险外部脚本时可关）
# external: 是否依赖 subprocess 外部脚本（默认智能选流可跳过，除非 --include-external）
# run_after: 拓扑排序边；smart plan 会递归补齐前置依赖，若依赖不可纳入则移除依赖方；成环时回退为 priority 排序

schema_version: "1.0"

e2e_scopes_zh:
  modeling: "仿真建模端到端（数据→流域/水文/水动力→报告）"
  control: "控制调度端到端（辨识·调度·MPC·ODD·WNAL·验证）"
  evaluation: "评价发布端到端（精度·自治·终审·release 包）"
  data: "数据与知识（审计·挖掘·注册表）"

profiles_help_zh:
  smart: "智能选流：数据就绪度 data_ok + 建模提示优先 + 默认跳过外部脚本与长时任务；若案例已生成 parameter_governance.latest.json，可自动纳入 hyd_sim"
  modeling: "仿真建模：仅 scopes 含 modeling 的工作流"
  control: "控制调度：仅 scopes 含 control 的工作流"
  evaluation: "评价审计：仅 scopes 含 evaluation 的工作流"
  full: "全量候选：data_ok 且 catalog 允许自动选流（仍默认排除 external/long）"
  registry_only: "加 --allow-registry-only 时纳入可行性为 registry_only 的工作流（契约未在规则表声明数据信号时）"

user_prompt_examples_zh:
  - "我要从数据跑到水文仿真和报告：使用 profile modeling，优先 model、calibrate、hydro_report"
  - "我要梯级控制和 ODD、WNAL：使用 profile control 并运行 cascade"
  - "我不知道跑什么，按数据自动安排：使用 profile smart"
  - "出 release 和终审：运行 build_final_report 与 hydrodesk_e2e_actions build-release-pack"

workflows:
  init:
    display_zh: "案例初始化（wxq 资料→配置骨架）"
    category_zh: "数据与初始化"
    scopes: [data, modeling]
    priority: 15
    auto_select: true
    external: false
  data_audit:
    display_zh: "数据质量审计"
    category_zh: "数据与知识"
    scopes: [data, evaluation]
    priority: 12
    auto_select: true
    external: false
    continue_on_outcome_statuses: [degraded]
  deep_record:
