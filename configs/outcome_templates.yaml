schema_version: "1.0"
templates:
  generic_template:
    name: "通用工作流模板"
    category: "general"
    business_goal: "完成工作流目标并产出可追溯结果"
    required_dimensions:
      - data
      - business
      - process
      - method
      - result
      - accuracy
      - conclusion
      - recommendation

  data_audit_template:
    name: "数据审计模板"
    category: "data_quality"
    business_goal: "完成数据完整性、合理性和一致性审计"
    required_dimensions:
      - data
      - process
      - result
      - conclusion
      - recommendation

  modeling_simulation_template:
    name: "建模仿真模板"
    category: "simulation"
    business_goal: "完成建模与仿真，并输出关键业务结果"
    required_dimensions:
      - data
      - business
      - process
      - method
      - result
      - accuracy
      - conclusion
      - recommendation

  calibration_assimilation_template:
    name: "率定同化模板"
    category: "calibration_assimilation"
    business_goal: "完成参数率定/同化并提升精度"
    required_dimensions:
      - data
      - process
      - method
      - accuracy
      - conclusion
      - recommendation

  forecast_template:
    name: "预测模板"
    category: "forecast"
    business_goal: "完成预测并给出可靠性评估"
    required_dimensions:
      - data
      - process
      - method
      - result
      - accuracy
      - conclusion
      - recommendation

  control_scheduling_template:
    name: "调控模板"
    category: "control"
    business_goal: "完成调度/控制并输出安全评估结论"
    required_dimensions:
      - data
      - process
      - method
      - result
      - accuracy
      - conclusion
      - recommendation

  evaluation_governance_template:
    name: "评估治理模板"
    category: "evaluation_governance"
    business_goal: "完成能力评估并形成治理建议"
    required_dimensions:
      - data
      - process
      - result
      - accuracy
      - conclusion
      - recommendation

  reservoir_template:
    name: "水库对象模板"
    category: "object_reservoir"
    object_type: "Reservoir"
    selection_mode: "template_alias"
    deprecated_alias_for: "reservoir_object_template"
    schema_definition: "hydromind.water_object_report.reservoir@1.0.0"
    business_goal: "完成水库对象建模、参数率定及调度策略评估"
    required_dimensions:
      - data
      - process
      - method
      - result
      - accuracy
      - conclusion
      - recommendation
    markdown_sections:
      - overview
      - topology_context
      - key_parameters
      - process_and_method
      - results_and_risks
      - recommendations_and_evidence
    json_required_fields:
      - object_id
      - object_type
      - display_name
      - summary
      - location
      - status
      - storage_capacity
      - normal_level
      - flood_limit_level
      - inflow_design
      - outlet_structures

  pump_template:
    name: "泵站对象模板"
    category: "object_pump"
    object_type: "PumpStation"
    selection_mode: "template_alias"
    deprecated_alias_for: "pump_station_object_template"
