  query_start: '2025-07-01 00:00:00'
  query_end: '2025-07-02 00:00:00'
output_dir: cases/yinchuojiliao/source_selection/product_outputs
validation:
  lat_range:
  - 44.4
  - 47.8
  lon_range:
  - 121.2
  - 123.7
  outlier_threshold_deg: 1.5
  min_precision_digits: 2
modeling:
  delineation:
    snap_distance: 5000.0
    stream_threshold: 100.0
  hydrology:
    runoff_model: xinanjiang
    routing_model: muskingum
    dt_hours: 1.0
    simulation_hours: 720
    closure_binding:
      time_step: 1min
      input:
        station_id: '24001207'
        station_name: 归流河进口
        variable: flow
      observed:
        station_id: '24001207'
        station_name: 归流河进口
        variable: flow
  hydraulics:
    dt_seconds: 10
    manning_n: 0.015
    steady_state_max_iter: 5000
    steady_state_tolerance: 0.05
