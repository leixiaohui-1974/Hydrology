# 雅砻江下游梯级 Case Configuration
# 参数提取自 YJDT/src/yjdt/config/yajiang_params.yaml 和 yajiang_bigbend_params.yaml
# All paths are relative to workspace root.

case_id: yajiang
display_name: 雅砻江下游梯级
project_type: cascade_hydro

scan_dirs:
  - YJDT/src/yjdt/config
  - pipedream-hydrology-integration-lab/configs

target_stations:
  - 墨脱水电站
  - 多雄藏布水电站
  - 达木水电站
  - 巴玉水电站
  - 通德水电站

scan_extensions:
  - .json
  - .csv
  - .yaml
  - .xlsx

dem_path: ""
river_network_path: ""
source_bundle_path: ""
case_manifest_path: cases/yajiang/contracts/case_manifest.json

topology_json_paths: []

sqlite_paths: []

output_dir: cases/yajiang/source_selection/product_outputs

topology:
  cascade_order:
    - YJ01
    - YJ02
    - YJ03
    - YJ04
    - YJ05

stations:
  YJ01:
    name: 墨脱水电站
    capacity_mw: 6000.0
    units: 6
    design_head_m: 480.0
    min_head_m: 450.0
    max_head_m: 510.0
    rated_flow_per_unit_m3s: 210.0
    turbine_efficiency: 0.94
  YJ02:
    name: 多雄藏布水电站
    capacity_mw: 3200.0
    units: 4
    design_head_m: 450.0
    min_head_m: 420.0
    max_head_m: 480.0
    rated_flow_per_unit_m3s: 200.0
    turbine_efficiency: 0.93
  YJ03:
    name: 达木水电站
    capacity_mw: 1800.0
    units: 3
    design_head_m: 400.0
    min_head_m: 370.0
    max_head_m: 430.0
    rated_flow_per_unit_m3s: 180.0
    turbine_efficiency: 0.93
  YJ04:
    name: 巴玉水电站
    capacity_mw: 1500.0
    units: 3
    design_head_m: 350.0
    min_head_m: 320.0
    max_head_m: 380.0
    rated_flow_per_unit_m3s: 160.0
    turbine_efficiency: 0.92
  YJ05:
    name: 通德水电站
    capacity_mw: 800.0
    units: 2
    design_head_m: 300.0
    min_head_m: 270.0
    max_head_m: 330.0
    rated_flow_per_unit_m3s: 150.0
    turbine_efficiency: 0.92

param_source_refs:
  - YJDT/src/yjdt/config/yajiang_params.yaml
  - YJDT/src/yjdt/config/yajiang_bigbend_params.yaml
  - pipedream-hydrology-integration-lab/configs/yajiang.yaml

validation:
  lat_range: [28.0, 31.0]
  lon_range: [93.0, 100.0]
  outlier_threshold_deg: 1.5
  min_precision_digits: 2

modeling:
  delineation:
    snap_distance: 5000.0
    stream_threshold: 100.0
  hydrology:
    runoff_model: xinanjiang
    routing_model: muskingum
    dt_hours: 1.0
    simulation_hours: 720
  hydraulics:
    dt_seconds: 10
    manning_n: 0.025
    steady_state_max_iter: 5000
    steady_state_tolerance: 0.05
