<!DOCTYPE html>
<html>
<head>
    <title>Rapid Water Modeling Tool</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Left Panel: Component Palette -->
        <div id="palette-pane" class="pane">
            <div class="palette-header">
                <h2>Components</h2>
                <div>
                    <button id="run-button">Run</button>
                    <button id="save-button">Save</button>
                    <button id="export-button">Export</button>
                </div>
            </div>
            <div class="component-item" draggable="true" data-type="Catchment">
                🏞️ Catchment
            </div>
            <div class="component-item" draggable="true" data-type="RiverReach">
                🌊 River Reach
            </div>
            <div class="component-item" draggable="true" data-type="Junction">
                ➕ Junction
            </div>
            <div class="component-item" draggable="true" data-type="Gate">
                ⛕ Gate
            </div>
            <div class="component-item" draggable="true" data-type="Pump">
                ポンプ Pump
            </div>
            <div class="component-item" draggable="true" data-type="HydraulicModel2D">
                🌐 2D Model Area
            </div>

            <!-- Data Registry & Preprocessing Pane -->
            <div id="data-pane">
                <div class="data-section">
                    <h3>Data Registry</h3>
                    <div id="data-source-list">
                        <!-- Data sources will be listed here -->
                    </div>
                    <div class="add-data-source">
                        <input type="text" id="new-source-name" placeholder="Source Name">
                        <input type="text" id="new-source-path" placeholder="File Path" readonly class="file-path-input">
                        <button class="browse-button" id="browse-new-source">...</button>
                        <button id="add-source-button" class="add-button">+</button>
                    </div>
                </div>

                <div class="data-section">
                    <h3>Areal Precipitation</h3>
                     <div class="property-row">
                        <label for="areal-precip-input-select">Input Rainfall:</label>
                        <select id="areal-precip-input-select"></select>
                    </div>
                    <div class="property-row file-input-row">
                        <label>Subbasins Shapefile:</label>
                        <input type="text" id="subbasins-file-path" readonly>
                        <button class="browse-button" id="browse-subbasins">...</button>
                    </div>
                    <div class="property-row file-input-row">
                        <label>Rain Gauges CSV:</label>
                        <input type="text" id="gauges-file-path" readonly>
                        <button class="browse-button" id="browse-gauges">...</button>
                    </div>
                    <div class="property-row">
                        <label for="interpolation-method-select">Method:</label>
                        <select id="interpolation-method-select">
                            <option value="idw">IDW</option>
                            <option value="thiessen">Thiessen</option>
                            <option value="kriging">Kriging</option>
                        </select>
                    </div>
                </div>

                <div class="data-section">
                    <h3>Preprocessing</h3>
                    <div class="property-row">
                        <label for="baseflow-source-select">Input Flow:</label>
                        <select id="baseflow-source-select"></select>
                    </div>
                     <div class="property-row">
                        <label for="baseflow-alpha-input">Alpha:</label>
                        <input type="number" id="baseflow-alpha-input" value="0.925" step="0.005">
                    </div>
                    <button id="preview-button">Preview Baseflow</button>
                    <div id="preview-plot-container">
                        <img id="preview-plot" src="" alt="Preprocessing Result"/>
                    </div>
                </div>
            </div>
        </div>

        <!-- Center Panel: Main Canvas -->
        <div id="canvas-pane" class="pane">
            <h2>Network Canvas</h2>
            <svg id="connections-svg"></svg> <!-- SVG layer for drawing connections -->
            <div id="canvas">
                <!-- Nodes will be added here dynamically by JavaScript -->
            </div>
        </div>

        <!-- Right Panel: Properties Pane -->
        <div id="properties-pane" class="pane">
            <h2>Properties / Plotting</h2>
            <div id="properties-content">
                <p>Select a component to see its properties.</p>
            </div>
            <div id="plotting-controls" style="display: none;">
                <h4>Plot Results</h4>
                <div class="property-row">
                    <label for="component-select">Component:</label>
                    <select id="component-select"></select>
                </div>
                <div class="property-row">
                    <label for="variable-select">Variable:</label>
                    <select id="variable-select"></select>
                </div>
                <button id="plot-button">Plot Selected</button>
            </div>
        </div>
    </div>

    <!-- Include Chart.js from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Include eel.js for Python-JS communication -->
    <script type="text/javascript" src="/eel.js"></script>
    <!-- Include Leaflet.js from CDN -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
    <!-- Main application logic -->
    <script type="text/javascript" src="app.js"></script>
    <script type="text/javascript" src="map.js"></script>

    <!-- Bottom Container for Tabbed Display -->
    <div id="bottom-container">
        <div class="tab-nav">
            <button class="tab-button active" data-tab="time-series-pane">Time Series</button>
            <button class="tab-button" data-tab="profile-pane">1D Profile</button>
            <button class="tab-button" data-tab="map-pane">2D Map</button>
            <button class="tab-button" data-tab="log-pane">Log</button>
        </div>
        <div class="tab-content">
            <!-- Time Series Chart Panel -->
            <div id="time-series-pane" class="tab-pane active">
                <canvas id="time-series-chart"></canvas>
            </div>
            <!-- 1D Profile Chart Panel -->
            <div id="profile-pane" class="tab-pane">
                <canvas id="profile-chart"></canvas>
            </div>
            <!-- 2D Map Panel -->
            <div id="map-pane" class="tab-pane" style="padding: 0; display: flex; flex-direction: column;">
                <div id="map-controls" style="padding: 5px; background-color: #f0f0f0; border-bottom: 1px solid #ccc;">
                    <label for="time-slider">Time Step:</label>
                    <input type="range" id="time-slider" min="0" max="0" value="0" style="width: 80%;">
                    <span id="time-label">0</span>
                </div>
                <div id="leaflet-map" style="width: 100%; flex-grow: 1;">
                    <div id="map-legend" class="leaflet-control"></div>
                </div>
            </div>
            <!-- Log Viewer Panel -->
            <div id="log-pane" class="tab-pane">
                <div class="log-header">
                    <h3>Simulation Log</h3>
                </div>
                <pre id="log-content"></pre>
            </div>
        </div>
    </div>
</body>
</html>
