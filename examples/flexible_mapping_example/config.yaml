# Configuration for Flexible Mapping Example

# Define a single component with a name that does NOT match the data column
components:
  - name: "my_model"
    type: HydrologicalModel
    parameters:
      runoff_module:
        type: SimpleRunoffModule
        parameters:
          S_max: 100.0
          c_loss: 0.1
      routing_module:
        type: SimpleRouting
        parameters:
          k_q: 0.8
          k_s: 0.1

# Define the data source
data_sources:
  sample_data_source:
    file: "sample_data.csv"

# Define the global input, mapping the data column to the component name
global_inputs:
  - inputs:
      my_model: # This key becomes the global input name, which the component will receive
        from_source: sample_data_source
        from_column: "DATA_COL_1"
