# Configuration for 2D Hydraulic Model Example

simulation_parameters:
  dt_seconds: 0.1 # 2D models require much smaller timesteps
  num_steps: 100

# --- Define Model Components ---
components:
  - name: "Channel2D"
    type: HydraulicModel2D
    parameters:
      mesh_file: "channel_mesh.json"
      # Define the boundary conditions
      boundary_conditions:
        - type: "flow"
          # These IDs were generated by the create_channel_mesh.py script
          edge_ids: [1, 12, 68, 172]

# --- Define Global Inputs ---
# The inflow for the 2D model is assigned to the component by name
global_inputs:
  - target_component: "Channel2D"
    inputs:
      # A constant inflow of 10 m3/s
      Channel2D:
        value: 10.0
