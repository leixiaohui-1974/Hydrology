# HPC优化模块配置文件
# ===================

# GPU加速配置
gpu_acceleration:
  device_type: "cuda"  # cuda, opencl, auto
  device_id: 0
  enable_mixed_precision: true
  memory_fraction: 0.8
  enable_tensor_cores: true

# 分布式计算配置
distributed_computing:
  max_workers: 8
  chunk_size: 100
  enable_mpi: false
  mpi_rank: 0
  mpi_size: 1
  communication_timeout: 30.0

# 异步计算配置
async_computing:
  max_concurrent_tasks: 100
  task_timeout: 300.0
  enable_priority_queue: true
  max_queue_size: 1000

# 内存优化配置
memory_optimization:
  memory_pool:
    block_size_mb: 1.0
    max_blocks: 1000
    enable_compaction: true
  
  cache:
    max_cache_size_mb: 100.0
    eviction_policy: "lru"  # lru, lfu, fifo
    enable_persistence: false
  
  compression:
    default_algorithm: "lz4"  # gzip, lz4, none
    compression_level: 6
    enable_adaptive_compression: true

# 算法优化配置
algorithm_optimization:
  linear_solver:
    default_solver: "auto"  # auto, spsolve, cg, gmres, spilu
    tolerance: 1e-6
    max_iterations: 1000
    enable_preconditioning: true
  
  nonlinear_solver:
    default_solver: "auto"  # auto, minimize, root_scalar, fsolve
    tolerance: 1e-8
    max_iterations: 100
    enable_bracketing: true
  
  numerical_integration:
    default_method: "auto"  # auto, quad, odeint, solve_ivp
    tolerance: 1e-8
    max_steps: 10000
    enable_adaptive_step: true
  
  sparse_matrix:
    default_format: "csr"  # csr, csc, coo
    enable_optimization: true
    enable_symmetry_detection: true

# 性能监控配置
performance_monitoring:
  enable_profiling: true
  profiling_sampling_rate: 0.1  # 采样率
  
  resource_monitoring:
    monitoring_interval: 1.0  # 秒
    max_data_points: 10000
    enable_disk_monitoring: true
    enable_network_monitoring: true
  
  benchmark:
    default_runs: 5
    enable_statistical_analysis: true
    confidence_level: 0.95

# 任务调度配置
task_scheduling:
  scheduler_type: "fifo"  # fifo, priority, round_robin
  enable_load_balancing: true
  load_balancing_algorithm: "least_loaded"  # least_loaded, round_robin, adaptive
  max_worker_idle_time: 60.0

# 存储优化配置
storage_optimization:
  enable_compression: true
  compression_threshold_mb: 1.0
  enable_indexing: true
  index_type: "btree"  # btree, hash, spatial
  enable_partitioning: false
  partition_size_mb: 100.0

# 并行计算配置
parallel_computing:
  process_pool:
    max_workers: 8
    enable_worker_reuse: true
    worker_lifetime: 300.0
  
  thread_pool:
    max_workers: 16
    enable_work_stealing: true
    steal_threshold: 0.5
  
  task_decomposition:
    strategy: "auto"  # auto, chunk, recursive, adaptive
    min_chunk_size: 10
    max_chunk_size: 1000

# 优化策略配置
optimization_strategies:
  enable_auto_tuning: true
  tuning_iterations: 10
  enable_adaptive_optimization: true
  
  performance_targets:
    target_execution_time: 1.0  # 秒
    target_memory_usage_mb: 100.0
    target_cpu_usage_percent: 80.0
  
  optimization_levels:
    level_1: "basic"      # 基本优化
    level_2: "standard"   # 标准优化
    level_3: "aggressive" # 激进优化

# 日志和输出配置
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  enable_file_logging: true
  log_file: "hpc_optimization.log"
  enable_performance_logging: true
  performance_log_file: "performance.log"

# 输出配置
output:
  enable_results_export: true
  export_format: "json"  # json, csv, pickle
  results_directory: "results"
  enable_plots: true
  plot_format: "png"  # png, pdf, svg
  plot_dpi: 300

# 调试配置
debug:
  enable_debug_mode: false
  enable_profiling_output: true
  enable_memory_tracking: false
  enable_performance_counters: true
  enable_error_tracking: true

