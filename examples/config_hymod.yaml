# Configuration file for a hydrological model using the HYMOD runoff module.

simulation_parameters:
  dt_seconds: 86400  # Daily time step
  num_steps: 10      # Reduced for a quick example run

components:
  - name: MyHymodCatchment
    type: HydrologicalModel
    parameters:
      runoff_module:
        type: HymodRunoffModule
        parameters:
          cmax: 250.0   # Maximum soil moisture capacity
          bexp: 1.0     # Soil moisture distribution exponent
          alpha: 0.5    # Quick/slow flow distribution factor
          ks: 0.05      # Slow flow reservoir coefficient
          kq: 0.5       # Quick flow reservoir coefficient

network: [] # No network, just a single component simulation

data_sources:
  rainfall_source:
    file: ../data/rainfall.csv
  pet_source:
    file: ../data/pet.csv

global_inputs:
  - target_component: MyHymodCatchment
    inputs:
      rainfall:
        from_source: rainfall_source
        from_column: rainfall_2
      pet:
        from_source: pet_source
        from_column: pet
