# Configuration for Areal Precipitation Example

simulation_parameters:
  dt_seconds: 86400 # Daily timestep
  num_steps: 30

# Define the components of our model
# The names 'zone1' and 'zone2' MUST match the subbasin IDs in the shapefile
components:
  - name: "zone1"
    type: HydrologicalModel
    parameters:
      runoff_module:
        type: SimpleRunoffModule
        parameters:
          S_max: 100.0 # Maximum soil moisture storage (mm)
          c_loss: 0.1 # Loss coefficient
      routing_module:
        type: SimpleRouting
        parameters:
          k_q: 0.8 # Quick flow coefficient
          k_s: 0.1 # Slow flow coefficient

  - name: "zone2"
    type: HydrologicalModel
    parameters:
      runoff_module:
        type: SimpleRunoffModule
        parameters:
          S_max: 120.0 # Maximum soil moisture storage (mm)
          c_loss: 0.1 # Loss coefficient
      routing_module:
        type: SimpleRouting
        parameters:
          k_q: 0.8 # Quick flow coefficient
          k_s: 0.1 # Slow flow coefficient

# Define the network connections
network:
  - from: "zone1"
    to: "zone2"

# NEW: Configure Areal Precipitation
areal_precipitation:
  input_name: "rainfall" # Use the 'rainfall' source from global_inputs
  output_name: "precip_areal" # The result will be stored under this name
  subbasins_shapefile: "subbasins_dissolved.shp"
  rain_gauges_file: "rain_gauges.csv"
  method: "kriging"
  parameters:
    variogram_model: "linear" # 'linear', 'power', 'gaussian', 'spherical', etc.
    grid_resolution: 5 # Use a coarse 5x5 grid for the example for speed

# Define data sources
data_sources:
  rainfall:
    file: "rainfall.csv"

# Define global inputs for the simulation run
global_inputs:
  - target_component: "zone1"
    inputs:
      rainfall:
        from_source: "precip_areal"
        from_column: "zone1"
      pet:
        value: 1.5
  - target_component: "zone2"
    inputs:
      rainfall:
        from_source: "precip_areal"
        from_column: "zone2"
      pet:
        value: 1.5
